<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Technical writing on cybersecurity, network security, and AI agents by Muhammad Lutfi Santoso." />
  <title>Blog — Muhammad Lutfi Santoso</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body class="bg-background text-text font-body antialiased">
  <header class="h-16 border-b border-border flex items-center">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full flex items-center justify-between">
      <a href="/" class="font-mono font-bold tracking-tight text-accent hover:underline">← Back to Portfolio</a>
      <h1 class="font-display font-bold text-lg">Blog</h1>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
    <div class="mb-12">
      <h2 class="text-4xl font-display font-bold mb-4">Technical Writing</h2>
      <p class="text-muted text-lg">Thoughts and deep dives into cybersecurity, PAM infrastructure, network automation, and building practical AI agents.</p>
    </div>
    
    <div id="blog-list" class="grid gap-8">
      <!-- Blog posts will be injected here by a script or loaded statically -->
      <p class="text-muted italic">Loading posts...</p>
    </div>
  </main>

  <script type="module">
    // Simple script to load and render blog posts from the generated data file
    import { blogPosts } from '/src/data/blog.ts';
    import { html } from '/src/utils/dom.ts';

    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('blog-list');
      if (!container) return;

      if (!blogPosts || blogPosts.length === 0) {
        container.innerHTML = '<p class="text-muted italic">No posts published yet.</p>';
        return;
      }

      container.innerHTML = blogPosts.map(post => html`
        <article class="p-6 rounded-card border border-border bg-surface hover:border-accent/50 transition-colors">
          <div class="flex items-center gap-3 text-sm text-muted mb-3 font-mono">
            <time datetime="${post.date}">${post.date}</time>
            <span>•</span>
            <span>${post.readTimeMin} min read</span>
            <span>•</span>
            <span class="text-accent-warm">${post.category}</span>
          </div>
          <h3 class="text-2xl font-bold font-display mb-3">
            <a href="${post.url}" class="hover:text-accent transition-colors">${post.title}</a>
          </h3>
          <p class="text-muted mb-4 line-clamp-2">${post.excerpt}</p>
          <div class="flex flex-wrap gap-2">
            ${post.tags.map(tag => html`<span class="text-xs bg-background border border-border px-2 py-1 rounded text-muted">#${tag}</span>`).join('')}
          </div>
        </article>
      `).join('');
    });
  </script>
</body>
</html>
